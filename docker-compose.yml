services:
  frontend:
    build:
      context: .
      dockerfile: .docker/frontend.Dockerfile
      target: ${DOCKER_TARGET:-development}
    volumes:
      - ./apps/frontend:/app
      - /app/node_modules
    environment:
      - ENV=${ENV:-development}
      - API_URL=${API_URL:-http://localhost/api}
      - VITE_PORT=${CONTAINER_PORT:-8080}
    networks:
      - app_network

  backend:
    build:
      context: .
      dockerfile: .docker/backend.Dockerfile
      target: ${DOCKER_TARGET:-development}
    volumes:
      - ./apps/backend:/app
    environment:
      - ENV=${ENV:-development}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-techzen}
      - MYSQL_USER=${MYSQL_USER:-techzen}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-password123}
      - MYSQL_HOST=db
      - MYSQL_PORT=3306
    depends_on:
      - db
    networks:
      - app_network

  nginx:
    image: nginx:stable-alpine
    ports:
      - "80:80"
    volumes:
      - ./.docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - app_network

  db:
    image: mysql:8.0
    container_name: mysql_db
    restart: always
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-techzen}
      MYSQL_USER: ${MYSQL_USER:-techzen}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-password123}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password_secure}
    ports:
      - "3306:3306"
    volumes:
      - ./.docker/mysql_data:/var/lib/mysql
    networks:
      - app_network

networks:
  app_network:
    driver: bridge
